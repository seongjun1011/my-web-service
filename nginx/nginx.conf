events {}

http {
    # Docker 내부 DNS - 재시작 후 IP가 바뀌어도 서비스명을 다시 해석
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name smpa.aikopo.net;

        # 1. /api로 시작하는 요청은 백엔드(web:3000)로 전달
        location /api {
            set $backend http://smartpantry-web:3000;
            proxy_pass $backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy true;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 2. 그 외 모든 요청은 프론트엔드(frontend:5173)로 전달
        location / {
            set $frontend http://smartpantry-frontend:5173;
            proxy_pass $frontend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
